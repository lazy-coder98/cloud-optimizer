# App (Railway sets PORT)
spring.application.name=cloud-optimizer
server.port=${PORT:8080}

# MongoDB (Railway: set MONGODB_URI in the service variables)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/cloud_optimizer}

# JWT — override in production via JWT_SECRET
jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey12}

# Forwarded headers (HTTPS / correct host behind Railway proxy)
server.forward-headers-strategy=framework
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# SpringDoc — keep Swagger off / so the React app can use /
# use-root-path=true maps Swagger to / and often breaks spec loading (Petstore fallback)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.use-root-path=false
springdoc.api-docs.path=/v3/api-docs

# Show SQL-equivalent MongoDB queries in logs (optional but useful)
logging.level.org.springframework.data.mongodb=DEBUG